# n8n - Queue Mode with PARTIAL Opt-Out (Experiment C)
# Telemetry disabled on main container ONLY. Worker has NO opt-out flags.
# Tests whether the worker leaks telemetry independently after opt-out.

services:
  n8n:
    image: n8nio/n8n:latest
    container_name: mys-n8n-queue-optout-partial-main
    restart: "no"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - WEBHOOK_URL=http://localhost:5678/
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_research_pw
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - N8N_ENCRYPTION_KEY=mys_research_encryption_key_2026
      # OPT-OUT: Disable telemetry on main container
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_VERSION_NOTIFICATIONS_ENABLED=false
      - N8N_TEMPLATES_ENABLED=false
      - EXTERNAL_FRONTEND_HOOKS_URLS=
      - N8N_DIAGNOSTICS_CONFIG_FRONTEND=
      - N8N_DIAGNOSTICS_CONFIG_BACKEND=
      - N8N_SECURE_COOKIE=false
    ports:
      - "5678:5678"
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:5678/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns:
      - 172.30.0.2
    networks:
      - internal
      - research-infra

  n8n-worker:
    image: n8nio/n8n:latest
    container_name: mys-n8n-queue-optout-partial-worker
    restart: "no"
    command: worker
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=n8n
      - DB_POSTGRESDB_USER=n8n
      - DB_POSTGRESDB_PASSWORD=n8n_research_pw
      - EXECUTIONS_MODE=queue
      - QUEUE_BULL_REDIS_HOST=redis
      - QUEUE_BULL_REDIS_PORT=6379
      - N8N_ENCRYPTION_KEY=mys_research_encryption_key_2026
      # NO OPT-OUT on worker (intentional)
    depends_on:
      n8n:
        condition: service_healthy
      redis:
        condition: service_healthy
    dns:
      - 172.30.0.2
    networks:
      - internal
      - research-infra

  postgres:
    image: postgres:16-alpine
    container_name: mys-n8n-queue-optout-partial-postgres
    restart: "no"
    environment:
      - POSTGRES_DB=n8n
      - POSTGRES_USER=n8n
      - POSTGRES_PASSWORD=n8n_research_pw
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U n8n"]
      interval: 5s
      timeout: 5s
      retries: 10
    dns:
      - 172.30.0.2
    networks:
      - internal
      - research-infra

  redis:
    image: redis:7-alpine
    container_name: mys-n8n-queue-optout-partial-redis
    restart: "no"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    dns:
      - 172.30.0.2
    networks:
      - internal
      - research-infra

networks:
  internal:
    driver: bridge
  research-infra:
    external: true
    name: mys-research-infra

volumes:
  postgres-data:
