# Immich - Single Container (Isolation Baseline)
# Runs only the Immich server without PostgreSQL, Redis, or ML container.
# Compare against immich/ (full stack) to test orchestration gap.
#
# Expected behavior: The server will likely fail to start or crash loop
# because it cannot connect to the database. This is the POINT.
# Any traffic (or lack thereof) demonstrates what DockerGym-style
# isolated analysis would capture vs the full stack.

services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:release
    container_name: mys-immich-solo
    restart: "no"
    environment:
      - DB_HOSTNAME=database
      - DB_USERNAME=postgres
      - DB_PASSWORD=immich_research_pw
      - DB_DATABASE_NAME=immich
      - REDIS_HOSTNAME=redis
    ports:
      - "2283:2283"
    dns:
      - 172.30.0.2
    networks:
      - internal
      - research-infra

networks:
  internal:
    driver: bridge
  research-infra:
    external: true
    name: mys-research-infra
